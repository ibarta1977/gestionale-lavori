function getContrasto(hexcolor = '#edf2f7'){
    hexcolor = hexcolor.replace("#", "");
    var r = parseInt(hexcolor.substr(0,2),16);
    var g = parseInt(hexcolor.substr(2,2),16);
    var b = parseInt(hexcolor.substr(4,2),16);
    var yiq = ((r*299)+(g*587)+(b*114))/1000;
    return (yiq >= 128) ? 'black' : 'white';
}
	

// --- AGGIUNTA CACHE LOCALE ALL'AVVIO ---
const cacheSalvata = localStorage.getItem('cache_clienti_globali');
if (cacheSalvata) {
    clienti = JSON.parse(cacheSalvata);
    console.log("Dati caricati dalla memoria locale (Offline-ready)");
    // Mostriamo subito i dati vecchi mentre aspettiamo il cloud

// ---------------------------------------

    auth.onAuthStateChanged(user => {

        if (user) {

    function login() {

    }
}

function mostraMessaggio(testo, durata = 3000) {
    // Rimuove notifiche precedenti se esistono
    const vecchia = document.getElementById('toast-notifica');
    if (vecchia) vecchia.remove();

    const toast = document.createElement('div');
    toast.id = 'toast-notifica';
    toast.innerText = testo;
    document.body.appendChild(toast);

    // Sparisce dopo X secondi
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 500);
    }, durata);
}

async function forzaAggiornamentoApp() {
    mostraMessaggio("Controllo aggiornamenti...");

    if ('serviceWorker' in navigator && location.protocol === 'https:') {
        const registrations = await navigator.serviceWorker.getRegistrations();
        if (registrations.length > 0) {
            let trovato = false;
            for (let registration of registrations) {
                await registration.update();
                if (registration.waiting || registration.installing) {
                    trovato = true;
                    mostraMessaggio("Nuova versione trovata! Riavvio...");
                    setTimeout(() => {
                        registration.unregister();
                        window.location.reload(true);
                    }, 1500);
                    return;
                }
            }
            if (!trovato) mostraMessaggio("L'app è già aggiornata!");
        }
    } else {
        // Fallback per test locale o browser vecchi
        mostraMessaggio("Cache ricaricata!");
        setTimeout(() => window.location.reload(true), 1500);
    }
}




    // DATABASE CLOUD
   function ascoltaDatiCloud() {
    const loadingEl = document.getElementById('loading');
    loadingEl.classList.remove('hidden');

    // Usiamo onAuthStateChanged per essere SICURI di avere l'utente prima di chiedere i dati
    auth.onAuthStateChanged(user => {
        if (user) {
            console.log("Sincronizzazione con UID:", user.uid);
            db.ref('clienti_globali/' + user.uid).on('value', snapshot => {
                const data = snapshot.val();
                clienti = data ? Object.values(data) : [];
                localStorage.setItem('cache_clienti_globali', JSON.stringify(clienti));
                renderLista(clienti);
                loadingEl.classList.add('hidden');
            }, err => {
                console.error("Errore database:", err.message);
                loadingEl.classList.add('hidden');
            });
        } else {
            loadingEl.classList.add('hidden');
            switchView('view-login');
        }
    });
}

    if(!cognome) return alert("Cognome obbligatorio!");
    
    const dati = {
        id: modoModificaCliente ? (clienti[clienteAttivoIdx].id || Date.now()) : Date.now(),
        titolo: (document.getElementById('titoloLavoro').value || "LAVORO").trim().toUpperCase(),

    };

    // DIARIO NOTA
	function salvaNota() {
    const data = document.getElementById('nota-data').value;
    const ore = parseFloat(document.getElementById('nota-ore').value) || 0;
    const costi = parseFloat(document.getElementById('nota-costi').value) || 0;
    const note = document.getElementById('nota-testo').value.trim(); // .trim() toglie spazi inutili all'inizio e alla fine

    // VALIDAZIONE: Se il campo note è vuoto, fermiamo il salvataggio
    if (note === "") {
        mostraMessaggio("⚠️ Inserisci una descrizione del lavoro!");
        // Evidenziamo il campo per attirare l'attenzione dell'utente
        document.getElementById('nota-testo').style.border = "2px solid #e53e3e";
        setTimeout(() => { document.getElementById('nota-testo').style.border = ""; }, 2000);
        return; 
    }

    if(!clienti[clienteAttivoIdx].diario) clienti[clienteAttivoIdx].diario = [];
    
    if(rigaDiarioModificaIdx !== null) {
        clienti[clienteAttivoIdx].diario[rigaDiarioModificaIdx] = {data, ore, costi, note};
    } else {
        clienti[clienteAttivoIdx].diario.push({data, ore, costi, note});
    }
    
    salvaSuCloud(); 
    resetFormNota(); 
    renderDiario();
    mostraMessaggio("✅ Nota salvata!");
}

    function renderDiario() {
    // Recuperiamo il diario o un array vuoto se non esiste
    const diarioOriginale = (clienti[clienteAttivoIdx] && clienti[clienteAttivoIdx].diario) ? clienti[clienteAttivoIdx].diario : [];
    const corpo = document.getElementById('corpo-diario');
    corpo.innerHTML = ''; 
    
    let hT = 0, cT = 0;

    // CREIAMO UNA COPIA MAPPATA: teniamo l'indice originale insieme ai dati
    // Questo risolve ogni problema di ordinamento e di "doppioni"
    const dMapped = diarioOriginale.map((nota, index) => ({
        ...nota,
        originalIndex: index
    }));

    // ORDINAMENTO: Prima per Data (Recente -> Vecchia)
    // Se la data è uguale, usiamo l'indice (Più alto/Ultimo inserito -> Più basso)
    dMapped.sort((a, b) => {
        const dataA = new Date(a.data);
        const dataB = new Date(b.data);
        if (dataB - dataA !== 0) {
            return dataB - dataA; // Ordine cronologico inverso
        }
        return b.originalIndex - a.originalIndex; // A parità di data, l'ultimo inserito va sopra
    });

    dMapped.forEach((r) => {
        // Forza il numero a float e applica i 2 decimali
        const oreNum = parseFloat(r.ore || 0);
        const costiNum = parseFloat(r.costi || 0);

        hT += oreNum; 
        cT += costiNum;

        let dataF = r.data ? r.data.split('-').reverse().join('/') : '---';

        corpo.innerHTML += `
            <tr>
                <td class="col-data">${dataF}</td>
                <td class="col-small">${oreNum.toFixed(2)}</td>
                <td class="col-small">${costiNum.toFixed(2)}€</td>
                <td>${r.note || ""}</td>
                <td class="col-azioni">
                    <button class="btn-yellow" style="padding:2px 5px;" onclick="preparaModificaNota(${r.originalIndex})">✏️</button>
                    <button class="btn-red" style="padding:2px 5px;" onclick="eliminaNota(${r.originalIndex})">🗑️</button>
                </td>
            </tr>`;
    });

    // Totali con 2 decimali fissi
    document.getElementById('tot-ore').innerText = hT.toFixed(2);
    document.getElementById('tot-costi').innerText = cT.toFixed(2);
}

	function filtraClienti() {
    const query = document.getElementById('cercaInput').value.toUpperCase().trim();
    
    if (!query) {
        renderLista(clienti);
        return;
    }

    const filtrati = clienti.filter(c => {
        const cognomeOk = c.cognome && c.cognome.toUpperCase().startsWith(query);
        const cittaOk = c.citta && c.citta.toUpperCase().startsWith(query);
        return cognomeOk || cittaOk;
    });

    // Ordiniamo i filtrati per Cognome così la lista non "balla"
    filtrati.sort((a, b) => (a.cognome || "").localeCompare(b.cognome || ""));

    renderLista(filtrati);
}

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const dati = JSON.parse(e.target.result);

                    clienti = dati; salvaSuCloud(); renderLista(); alert("Ripristino completato!");

            } catch (err) { alert("File non valido"); }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

        const pA = cats[a].pos !== undefined ? parseInt(cats[a].pos) : 999;
        const pB = cats[b].pos !== undefined ? parseInt(cats[b].pos) : 999;
        return pA - pB;
    });

    const indiceAttuale = listaOrdinata.indexOf(idCat);
    if (indiceAttuale === -1) return;

    // Calcoliamo la nuova destinazione
    let nuovoIndice = direzione === 'indietro' ? indiceAttuale - 1 : indiceAttuale + 1;

    // Se proviamo ad andare oltre i limiti, fermiamo tutto
    if (nuovoIndice < 0 || nuovoIndice >= listaOrdinata.length) return;

    // Rimuoviamo l'id dalla posizione vecchia e lo inseriamo in quella nuova
    listaOrdinata.splice(indiceAttuale, 1);
    listaOrdinata.splice(nuovoIndice, 0, idCat);

    // Prepariamo l'oggetto per l'aggiornamento massivo su Firebase
    const updates = {};
    listaOrdinata.forEach((id, index) => {
        // Assegniamo posizioni 10, 20, 30... (molto più pulito)
        updates[id + '/pos'] = (index + 1) * 10;
    });

    // Aggiorniamo Firebase
    refListino.update(updates).then(() => {
        console.log("Ordine categorie sincronizzato");
    }).catch(error => {
        console.error("Errore durante lo spostamento:", error);
    });
}

let valoreTastierino = "0";
let callbackTastierino = null;
let primaDigitazione = false; // Variabile di controllo

function inputTastierino(t) {
    const display = document.getElementById('tastierino-display');
    
	// Mappa per la visualizzazione testuale delle UM
    const nomiUM = { "1": "MT", "2": "NR", "3": "KG", "4": "CONF" };
	
    if (t === 'C') {
        valoreTastierino = "0";
        primaDigitazione = false;
    } 
    else if (t === '.') {
        // Se premo la virgola...
        primaDigitazione = false; // DISATTIVIAMO la sovrascrittura: vogliamo tenere il numero
        if (!valoreTastierino.includes('.')) {
            valoreTastierino += '.';
        }
    } 
    else {
        // Se premo un NUMERO...
        if (primaDigitazione) {
            // Se è il primo tasto premuto, cancello tutto e scrivo il numero
            valoreTastierino = t; 
            primaDigitazione = false; 
        } else {
            // Se non è il primo tasto, aggiungo normalmente
            if (valoreTastierino === "0") valoreTastierino = t;
            else valoreTastierino += t;
        }
    }
	
	// VISUALIZZAZIONE OTTIMIZZATA
    const titoloElement = document.getElementById('tastierino-titolo');
    const titoloTesto = titoloElement ? titoloElement.innerText.toLowerCase() : "";
    
    // Controlliamo se nel titolo c'è "unità" (minuscolo, così non sbaglia mai)
    if (titoloTesto.includes("unità") && nomiUM[valoreTastierino]) {
        display.innerText = nomiUM[valoreTastierino];
    } else {
        display.innerText = valoreTastierino.replace('.', ',');
    }
}

function chiudiTastierino(conferma) {
    document.getElementById('modal-tastierino').style.display = 'none';
    if (callbackTastierino) {
        const valoreFinale = conferma ? parseFloat(valoreTastierino) : null;
        callbackTastierino(valoreFinale);
    }
}

function apriTastierino(titolo, cb, valoreIniziale) {
    // 1. Impostiamo il valore logico
    valoreTastierino = valoreIniziale !== undefined ? valoreIniziale.toString() : "0";
    
    // 2. CORREZIONE: Scriviamo il valore reale sul display (non lo "0" fisso!)
    document.getElementById('tastierino-display').innerText = valoreTastierino.replace('.', ',');
    
    document.getElementById('tastierino-titolo').innerHTML = titolo;
    callbackTastierino = cb;
    
    // 3. Diciamo al tastierino che siamo all'inizio (così se premi un numero cancella il vecchio)
    primaDigitazione = true; 
    
    // CONTROLLO UM: Se il titolo contiene "Unità", mostriamo i tasti rapidi
    const areaUM = document.getElementById('area-um-rapida');
    if (titolo.includes("Unità")) {

let statoOrdinamento = 0; // 0: Data, 1: A-Z, 2: Urgenza

function ciclaOrdinamento() {
    statoOrdinamento = (statoOrdinamento + 1) % 3;
    const btn = document.getElementById('btn-ordina');
    
    if (statoOrdinamento === 0) {
        btn.innerHTML = "🕒 ORDINE: DATA";
        clienti.sort((a, b) => b.id - a.id); // Più recenti in alto
    } else if (statoOrdinamento === 1) {
        btn.innerHTML = "🔠 ORDINE: A-Z";
        clienti.sort((a, b) => (a.cognome || "").localeCompare(b.cognome || ""));
    } else if (statoOrdinamento === 2) {
        btn.innerHTML = "🚨 ORDINE: URGENZA";
        clienti.sort((a, b) => b.urgenza - a.urgenza); // Urgenza 2 (Rosso) va in cima
    }
    
    renderLista();
}























function esportaMaterialiCSV() {
    if (!mioListino) {
        alert("Nessun dato da esportare.");
        return;
    }

    // Intestazione del file CSV
    // Cambiato ID in Codice per evitare errore SYLK di Excel (con aggiunta colonna Posizione)
    let csvContent = "Codice_Cat;Nome_Cat;Colore_Cat;Codice_Sub;Nome_Sub;Colore_Sub;Nome_Art;Prezzo;UM;Posizione\n";
    
    // Usiamo incrementi di 10 (es: 10, 20, 30) è più comodo per inserimenti futuri manuali
    let contatorePos = 10; 

    // Cicliamo tra i dati per costruire le righe
    for (let catKey in mioListino) {
        const cat = mioListino[catKey];
        const nomeCat = (cat.nome || "").replace(/;/g, ",");
        const colCat = cat.colore || "#3182ce";

        if (cat.sottocategorie) {
            for (let subKey in cat.sottocategorie) {
                const sub = cat.sottocategorie[subKey];
                const nomeSub = (sub.nome || "").replace(/;/g, ",");
                const colSub = sub.colore || "#4a5568";

                if (sub.articoli) {
                    for (let artKey in sub.articoli) {
                        const art = sub.articoli[artKey];
                        
                        // Pulizia dati: togliamo eventuali punti e virgola dai nomi per non rompere il CSV
                        const n = (art.n || "").replace(/;/g, ",");
                        const p = art.p || 0;
                        const u = art.u || "";
                        
                        // Scriviamo riga con ID, Colori e la posizione calcolata
                        csvContent += `${catKey};${nomeCat};${colCat};${subKey};${nomeSub};${colSub};${n};${p};${u};${contatorePos}\n`;
                        
                        // Incrementiamo il contatore per il prossimo articolo
                        contatorePos += 10;
                    }
                }
            }
        }
    }

    // Creazione del file e download
    // Il "\ufeff" all'inizio serve a far capire a Excel che è UTF-8 senza errori
    const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.setAttribute("href", URL.createObjectURL(blob));
    link.setAttribute("download", "listino_materiali.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}




function importaMaterialiCSV(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const contenuto = e.target.result;
            const righe = contenuto.split(/\r?\n/);
            const refListinoBase = refListino; 
            let contatoreErrori = 0;
            let articoliProcessati = 0;

            for (let i = 1; i < righe.length; i++) {
                if (righe[i].trim() === "") continue;

                const colonne = righe[i].split(";");
                
                // Controllo se mancano colonne fondamentali
                if (colonne.length < 9) {
                    console.error(`Riga ${i+1}: Formato non valido (colonne insufficienti).`);
                    contatoreErrori++;
                    continue;
                }

                const [idCat, nomeCat, colCat, idSub, nomeSub, colSub, nomeArt, prezzo, um, posizione] = colonne;

                // VALIDAZIONE DATI CRITICI
                if (!idCat || !idSub || !nomeArt) {
                    console.error(`Riga ${i+1}: Mancano dati obbligatori (ID o Nome Articolo).`);
                    contatoreErrori++;
                    continue;
                }

                // Gestione Prezzo: se vuoto o non numerico, impostiamo 0
                let pFinale = parseFloat(prezzo.toString().replace(',', '.'));
                if (isNaN(pFinale)) pFinale = 0;

                const datiArticolo = {
                    n: nomeArt.toUpperCase().trim(),
                    p: pFinale,
                    u: (um || "nr").toLowerCase().trim(),
                    pos: parseInt(posizione) || 999
                };

                // 1. Aggiorna Categoria
                refListinoBase.child(idCat).update({
                    nome: nomeCat.toUpperCase().trim(),
                    colore: colCat.trim()
                });

                // 2. Aggiorna Sottocategoria
                refListinoBase.child(idCat).child('sottocategorie').child(idSub).update({
                    nome: nomeSub.toUpperCase().trim(),
                    colore: colSub.trim()
                });

                // 3. Sincronizzazione Articolo
                const refArticoli = refListinoBase.child(idCat).child('sottocategorie').child(idSub).child('articoli');
                let artIdEsistente = null;
                const articoliLocali = mioListino[idCat]?.sottocategorie[idSub]?.articoli || {};
                
                for (let idKey in articoliLocali) {
                    if (articoliLocali[idKey].n === datiArticolo.n) {
                        artIdEsistente = idKey;
                        break;
                    }
                }

                if (artIdEsistente) {
                    refArticoli.child(artIdEsistente).update(datiArticolo);
                } else {
                    refArticoli.push(datiArticolo);
                }
                articoliProcessati++;
            }
            
            // Messaggio finale dettagliato
            if (contatoreErrori > 0) {
                alert(`✅ Importazione completata con avvisi!\n- Articoli ok: ${articoliProcessati}\n- Righe saltate per errori: ${contatoreErrori}\n(Controlla la console del browser per i dettagli)`);
            } else {
                mostraMessaggio(`✅ Importazione di ${articoliProcessati} articoli riuscita!`);
            }

        } catch (err) {
            alert("❌ Errore critico durante l'importazione: " + err.message);
        }
        event.target.value = "";
    };
    reader.readAsText(file);
}

            inputTastierino('C'); // O potremmo fare un delete singolo, ma 'C' è più sicuro
       } else if (key === 'Enter') {
            event.preventDefault(); // BLOCCA l'invio al form sottostante
            event.stopPropagation(); // Impedisce all'evento di "salire"
            chiudiTastierino(true);
        } else if (key === 'Escape') {
            chiudiTastierino(false);
        }
    }
}, true); // Il "true" finale aiuta a catturare l'evento prima degli altri bottoni
